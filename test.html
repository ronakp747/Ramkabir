<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" href="CSS/Home.css">
    <link rel="stylesheet" href="CSS/Style.css">
    <link rel="stylesheet" href="CSS/DailyThoughts.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div id="TopBar"></div>
<div id="SideBar"></div>

<section class="main-content">
  <div class="main-container">
    <h3>Home</h3>
    <hr>
  </div>
  <div class="daily-thought-box">
    <img src="Images/DailyThoughts.png" alt="Daily Thought Background" class="thought-image">
    <div class="daily-thought-text-overlay">
      <p class="thought-text" id="quote"></p>
      <p class="thought-author" id="author"></p>
    </div>
  </div>
</section>
<div id="BottomContent"></div>


<script>
    fetch('layout/TopBar.html')
      .then(response => response.text())
      .then(data => document.getElementById('TopBar').innerHTML = data);
    fetch('layout/SideBar.html')
      .then(response => response.text())
      .then(data => document.getElementById('TopBar').innerHTML = data);
    fetch('layout/BottomContent.html')
      .then(response => response.text())
      .then(data => document.getElementById('TopBar').innerHTML = data);
</script>

<script src="JS/topBar.js"></script>
<script src="JS/dailyThought.js"></script>
</body>
</html>
